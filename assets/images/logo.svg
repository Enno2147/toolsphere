<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Outer sphere / orbit -->
  <circle cx="60" cy="60" r="52" fill="none" stroke="#6366f1" stroke-width="3" opacity="0.25"/>
  <circle cx="60" cy="60" r="42" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.15"/>
  
  <!-- Central hexagon / tool symbol -->
  <polygon points="60,22 85,35 85,65 60,78 35,65 35,35" fill="url(#grad)" stroke="#fff" stroke-width="1.5" stroke-opacity="0.9"/>
  
  <!-- Inner detail -->
  <circle cx="60" cy="60" r="14" fill="#0a0b0f"/>
  <circle cx="60" cy="60" r="7.5" fill="#6366f1"/>
  
  <!-- Small connection dots (tools) -->
  <circle cx="85" cy="35" r="3.5" fill="#a855f7"/>
  <circle cx="85" cy="65" r="3.5" fill="#a855f7"/>
  <circle cx="35" cy="35" r="3.5" fill="#a855f7"/>
  <circle cx="35" cy="65" r="3.5" fill="#a855f7"/>
</svg>